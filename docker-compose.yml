services:
  postgres:
    image: postgres:17-alpine
    container_name: searchbugs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-searchbugs}
      POSTGRES_USER: ${POSTGRES_USER:-searchbugs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-searchbugs}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-searchbugs} -d ${POSTGRES_DB:-searchbugs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: searchbugs-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../searchbugs-api
    container_name: searchbugs-api
    restart: unless-stopped
    env_file:
      - ../searchbugs-api/.env.example
    environment:
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-searchbugs}:${POSTGRES_PASSWORD:-searchbugs}@postgres:5432/${POSTGRES_DB:-searchbugs}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    build:
      context: ../searchbugs-web
    container_name: searchbugs-web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8000}/api/v1
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:5173"

volumes:
  postgres-data:

